version: '3.8'

services:
  db:
    image: postgres:13
    env_file: .env
    restart: unless-stopped
    ports:
      - "5432:5432"
    networks:
      - banco-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  transaction-service:
    build: ./api-transacoes
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - banco-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  query-service:
    build: ./servico-query
    restart: always
    ports:
      - "5001:5000"
    depends_on:
      - db
    networks:
      - banco-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  banco-network:
    driver: bridge